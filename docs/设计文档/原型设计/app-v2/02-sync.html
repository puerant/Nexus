<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Workflow — 配置同步</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --surface: #F5F7FA; --border: #E1E4E8;
      --text-1: #0D1117; --text-2: #6E7781; --text-3: #B1BAC4;
      --accent: #007AFF; --accent-bg: #EBF5FF; --hover: #F6F8FA;
      --r: 12px; --r-sm: 8px; --r-xs: 6px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      font-family: var(--font); background: #1C1C1E;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      width: 560px; background: var(--bg);
      border-radius: 14px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .titlebar {
      height: 40px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; user-select: none;
    }
    .wc { display: flex; gap: 8px; }
    .wc-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
    .wc-dot.r { background: #FF5F57; }
    .wc-dot.y { background: #FEBC2E; }
    .wc-dot.g { background: #28C840; }
    .titlebar-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--accent); cursor: pointer;
      text-decoration: none; padding: 4px 8px; margin-left: 8px;
    }
    .titlebar-title {
      flex: 1; text-align: center;
      font-size: 13px; color: var(--text-2); font-weight: 400;
    }
    .titlebar-spacer { width: 80px; }

    .content { padding: 36px 40px 40px; }
    .step-indicator {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 28px;
    }
    .step { display: flex; align-items: center; gap: 6px; }
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border);
    }
    .step-dot.done { background: var(--accent); }
    .step-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }
    .step-line { flex: 1; height: 1px; background: var(--border); }
    .step-label { font-size: 11.5px; color: var(--text-3); }
    .step-label.active { color: var(--accent); font-weight: 500; }

    h2 { font-size: 20px; font-weight: 600; color: var(--text-1); letter-spacing: -0.4px; margin-bottom: 6px; }
    .subtitle { font-size: 13.5px; color: var(--text-2); line-height: 1.5; margin-bottom: 28px; }

    /* Option cards */
    .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .option-card {
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .option-card:hover { border-color: #C0D8F5; background: #FAFCFF; }
    .option-card.selected {
      border-color: var(--accent);
      background: var(--accent-bg);
    }
    .option-head {
      display: flex; align-items: flex-start; gap: 14px;
    }
    .option-icon {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      background: white; flex-shrink: 0;
    }
    .option-card.selected .option-icon {
      border-color: #C0D8F5; background: #DFF0FF;
    }
    .option-label { font-size: 14px; font-weight: 600; color: var(--text-1); }
    .option-desc { font-size: 12.5px; color: var(--text-2); margin-top: 3px; line-height: 1.5; }
    .option-radio {
      position: absolute; top: 20px; right: 20px;
      width: 16px; height: 16px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .option-card.selected .option-radio {
      border-color: var(--accent); background: var(--accent);
    }
    .option-card.selected .option-radio::after {
      content: ''; width: 6px; height: 6px;
      background: white; border-radius: 50%;
    }

    /* GitHub form (shown when GitHub selected) */
    .github-form {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #D0E8FF;
      display: flex; flex-direction: column; gap: 12px;
    }
    .field-label {
      font-size: 12px; font-weight: 500; color: var(--text-2);
      margin-bottom: 6px; display: block;
    }
    .field-input {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      font-size: 13px; font-family: var(--font);
      color: var(--text-1); background: white;
      outline: none; transition: border-color 0.1s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text-3); }
    .field-hint { font-size: 11.5px; color: var(--text-3); margin-top: 5px; }
    .input-row { display: flex; gap: 8px; }
    .connect-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      font-size: 13px; font-family: var(--font);
      background: white; cursor: pointer; white-space: nowrap;
      color: var(--text-1); transition: all 0.1s;
    }
    .connect-btn:hover { background: var(--hover); border-color: #C0D8F5; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px; font-size: 12px; color: var(--text-3);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Buttons */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 20px; border-radius: var(--r-sm);
      font-size: 13.5px; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid transparent; transition: all 0.1s;
      text-decoration: none;
    }
    .btn-ghost { background: var(--surface); color: var(--text-1); border-color: var(--border); flex: 0 0 auto; padding: 10px 18px; }
    .btn-ghost:hover { background: var(--hover); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #0062CC; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Title bar -->
    <div class="titlebar">
      <div class="wc">
        <div class="wc-dot r"></div>
        <div class="wc-dot y"></div>
        <div class="wc-dot g"></div>
      </div>
      <a href="01-workspace.html" class="titlebar-back">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 11L5 7L9 3" stroke="#007AFF" stroke-width="1"/>
        </svg>
        返回
      </a>
      <div class="titlebar-title">配置同步</div>
      <div class="titlebar-spacer"></div>
    </div>

    <div class="content">
      <!-- Step indicator -->
      <div class="step-indicator">
        <div class="step">
          <div class="step-dot done"></div>
        </div>
        <div class="step-line" style="background: var(--accent); opacity:0.3;"></div>
        <div class="step">
          <div class="step-dot active"></div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-dot"></div>
        </div>
      </div>

      <h2>配置同步方式</h2>
      <p class="subtitle">选择如何同步你的工作区。可以随时在设置中更改。</p>

      <div class="options">
        <!-- GitHub option (selected) -->
        <div class="option-card selected" onclick="this.classList.toggle('selected'); document.getElementById('nosync').classList.remove('selected')">
          <div class="option-radio"></div>
          <div class="option-head">
            <div class="option-icon">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 1.5C5.3 1.5 1.5 5.3 1.5 10C1.5 13.7 3.9 16.8 7.2 17.9C7.6 17.97 7.75 17.73 7.75 17.52V16.1C5.5 16.58 5.04 15.1 5.04 15.1C4.68 14.13 4.16 13.89 4.16 13.89C3.45 13.4 4.21 13.41 4.21 13.41C4.99 13.47 5.4 14.22 5.4 14.22C6.1 15.48 7.28 15.1 7.77 14.88C7.84 14.37 8.04 14.02 8.27 13.82C6.45 13.62 4.54 12.93 4.54 9.8C4.54 8.86 4.87 8.09 5.42 7.48C5.34 7.28 5.05 6.4 5.5 5.2C5.5 5.2 6.16 4.98 7.75 6.12C8.42 5.94 9.12 5.85 9.83 5.85C10.54 5.85 11.24 5.94 11.91 6.12C13.5 4.98 14.16 5.2 14.16 5.2C14.61 6.4 14.32 7.28 14.24 7.48C14.79 8.09 15.12 8.86 15.12 9.8C15.12 12.94 13.2 13.61 11.38 13.81C11.67 14.06 11.93 14.54 11.93 15.27V17.52C11.93 17.73 12.08 17.98 12.49 17.9C15.79 16.79 18.17 13.68 18.17 10C18.17 5.3 14.37 1.5 9.67 1.5H10Z" stroke="#6E7781" stroke-width="1" fill="none"/>
              </svg>
            </div>
            <div>
              <div class="option-label">连接 GitHub 仓库</div>
              <div class="option-desc">将文档同步到 GitHub，支持版本控制和团队协作</div>
            </div>
          </div>
          <!-- GitHub form -->
          <div class="github-form">
            <div>
              <label class="field-label">仓库地址</label>
              <div class="input-row">
                <input class="field-input" type="text" placeholder="https://github.com/username/repo" style="flex:1">
                <button class="connect-btn">
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M9 1H12V4M12 1L7 6M2 3H4.5V10.5H12" stroke="#6E7781" stroke-width="1"/>
                  </svg>
                  验证
                </button>
              </div>
              <div class="field-hint">支持 HTTPS 或 SSH 格式</div>
            </div>
            <div>
              <label class="field-label">Personal Access Token（可选）</label>
              <input class="field-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
              <div class="field-hint">用于私有仓库访问。令牌仅存储在本地。</div>
            </div>
          </div>
        </div>

        <!-- No sync option -->
        <div class="option-card" id="nosync" onclick="this.classList.add('selected'); document.querySelector('.option-card:first-child').classList.remove('selected')">
          <div class="option-radio"></div>
          <div class="option-head">
            <div class="option-icon">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M3 10H17M10 3V17" stroke="#6E7781" stroke-width="1"/>
                <circle cx="10" cy="10" r="7.5" stroke="#6E7781" stroke-width="1"/>
                <path d="M4.5 4.5L15.5 15.5" stroke="#6E7781" stroke-width="1"/>
              </svg>
            </div>
            <div>
              <div class="option-label">暂不同步</div>
              <div class="option-desc">仅保存在本地文件夹，不连接任何远程仓库，可以随时在设置中开启</div>
            </div>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <a href="01-workspace.html" class="btn btn-ghost">返回</a>
        <a href="03-project.html" class="btn btn-primary">
          进入工作区
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3L9 7L5 11" stroke="white" stroke-width="1"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</body>
</html>

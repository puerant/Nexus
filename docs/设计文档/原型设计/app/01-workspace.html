<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0C0F;--panel:#111318;--item:#161820;--hover:#1A1D26;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --t1:#E2E5ED;--t2:#525666;--t3:#272A36;
  --accent:#7C6AF7;--accent-bg:rgba(124,106,247,0.09);
  --green:#22C55E;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center}

.shell{width:360px}

.logo{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:52px}
.logo-mark{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--t1)}

h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:7px}
.sub{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:32px}

.folder-row{
  background:var(--panel);border:1px solid var(--line2);border-radius:8px;
  padding:11px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .15s;margin-bottom:28px;
}
.folder-row:hover,.folder-row.sel{border-color:rgba(124,106,247,0.45)}
.folder-icon{font-size:15px;flex-shrink:0}
.folder-path{flex:1;font-family:var(--mono);font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-row.sel .folder-path{color:var(--t1)}
.browse{background:var(--item);border:1px solid var(--line);color:var(--t2);font-family:var(--sans);font-size:11.5px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.browse:hover{border-color:var(--line2);color:var(--t1)}

.section-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:8px}

.recent-list{display:flex;flex-direction:column;gap:1px;margin-bottom:28px}
.recent-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:6px;cursor:pointer;transition:background .12s}
.recent-item:hover{background:var(--hover)}
.ri-icon{font-size:14px;flex-shrink:0}
.ri-name{font-size:13px;color:var(--t1);flex:1;white-space:nowrap}
.ri-path{font-size:11px;font-family:var(--mono);color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}

.btn-primary{
  width:100%;background:var(--accent);color:#fff;border:none;
  font-family:var(--sans);font-size:13.5px;font-weight:600;
  padding:12px;border-radius:8px;cursor:pointer;transition:opacity .15s;margin-bottom:10px;
}
.btn-primary:hover:not(:disabled){opacity:.87}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{
  width:100%;background:transparent;border:1px solid var(--line);color:var(--t2);
  font-family:var(--sans);font-size:13px;padding:11px;border-radius:8px;cursor:pointer;transition:all .15s;
}
.btn-ghost:hover{border-color:var(--line2);color:var(--t1)}
</style>
</head>
<body>
<div class="shell">
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <span class="logo-name">AI Workflow</span>
  </div>

  <h1>打开工作区</h1>
  <p class="sub">选择一个本地文件夹作为工作区，所有产物文件和配置将保存在 <code style="font-family:var(--mono);font-size:11px;color:var(--t2)">.ai-workflow/</code> 目录中。</p>

  <div class="folder-row sel" id="fr" onclick="pickFolder()">
    <span class="folder-icon">📁</span>
    <span class="folder-path" id="fpath">/Developer/ai-ecommerce</span>
    <button class="browse" onclick="event.stopPropagation();pickFolder()">浏览</button>
  </div>

  <div class="section-label">最近打开</div>
  <div class="recent-list">
    <div class="recent-item" onclick="sel('/Developer/ai-ecommerce')">
      <span class="ri-icon" style="color:#7C6AF7">📂</span>
      <span class="ri-name">AI 电商平台</span>
      <span class="ri-path">/Developer/ai-ecommerce</span>
    </div>
    <div class="recent-item" onclick="sel('/Developer/oa-system')">
      <span class="ri-icon" style="color:#22C55E">📂</span>
      <span class="ri-name">企业 OA 系统</span>
      <span class="ri-path">/Developer/oa-system</span>
    </div>
    <div class="recent-item" onclick="sel('/Developer/dataviz')">
      <span class="ri-icon" style="color:#F59E0B">📂</span>
      <span class="ri-name">数据可视化平台</span>
      <span class="ri-path">/Developer/dataviz</span>
    </div>
  </div>

  <button class="btn-primary" onclick="location.href='./02-dashboard.html'">打开工作区</button>
  <button class="btn-ghost">在此文件夹初始化新项目</button>
</div>

<script>
function sel(p){
  document.getElementById('fpath').textContent=p;
  document.getElementById('fr').classList.add('sel');
}
function pickFolder(){sel('/Developer/new-workspace');}
</script>
</body>
</html>

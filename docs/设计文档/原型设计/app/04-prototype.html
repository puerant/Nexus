<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow — 原型设计</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0C0F;--panel:#111318;--item:#161820;--hover:#1A1D26;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --t1:#E2E5ED;--t2:#525666;--t3:#272A36;
  --accent:#7C6AF7;--accent-bg:rgba(124,106,247,0.09);
  --green:#22C55E;--amber:#F59E0B;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex}

/* Sidebar */
.sidebar{width:200px;min-width:200px;background:var(--panel);display:flex;flex-direction:column;padding:16px 10px;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:20px}
.sb-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;letter-spacing:-.2px}
.sb-ws{padding:8px 10px;margin-bottom:16px}
.sb-ws-path{font-size:10.5px;font-family:var(--mono);color:var(--t3);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ws-name{font-size:13px;font-weight:600;color:var(--t1)}
.sb-div{height:1px;background:var(--line);margin:0 10px 12px}
.sb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:0 10px 8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--t2);text-decoration:none;transition:background .12s,color .12s;margin-bottom:1px}
.nav-item:hover{background:var(--hover);color:var(--t1)}
.nav-item.active{background:var(--accent-bg);color:var(--t1)}
.stage-dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid var(--line2)}
.stage-dot.done{background:transparent;border-color:rgba(34,197,94,0.3);color:var(--green)}
.stage-dot.active{background:var(--accent-bg);border-color:rgba(124,106,247,0.4);color:var(--accent)}
.stage-dot.pending{background:transparent;border-color:var(--line);color:var(--t3)}
.sb-flex{flex:1}
.sb-footer{border-top:1px solid var(--line);padding-top:10px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid var(--line)}
.topbar-title{font-size:14px;font-weight:600;flex:1}
.model-tag{background:var(--item);border:1px solid var(--line);color:var(--t2);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:6px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:border-color .15s}
.model-tag:hover{border-color:var(--line2)}
.model-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.tb-btn{background:transparent;border:1px solid var(--line);color:var(--t2);font-family:var(--sans);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
.tb-btn:hover{border-color:var(--line2);color:var(--t1)}
.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.tb-btn.primary:hover{opacity:.88}

/* Content area */
.proto-layout{flex:1;display:flex;overflow:hidden}

/* Versions panel */
.versions-panel{width:200px;min-width:200px;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.vp-header{padding:14px 14px 10px;border-bottom:1px solid var(--line)}
.vp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:10px}
.new-page-btn{width:100%;background:var(--item);border:1px solid var(--line);color:var(--t2);font-family:var(--sans);font-size:12px;padding:7px;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.new-page-btn:hover{border-color:var(--line2);color:var(--t1)}

.vp-list{flex:1;overflow-y:auto;padding:10px 10px}
.vp-list::-webkit-scrollbar{width:3px}
.vp-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.version-section{margin-bottom:16px}
.vs-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);padding:0 4px;margin-bottom:6px}

.page-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .12s;margin-bottom:1px}
.page-item:hover{background:var(--hover)}
.page-item.active{background:var(--accent-bg)}
.page-icon{font-size:13px;flex-shrink:0}
.page-name{font-size:12.5px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-item.active .page-name{color:var(--t1)}
.page-archived{font-size:10px;color:var(--t3);font-family:var(--mono)}

.vp-footer{padding:10px 14px;border-top:1px solid var(--line)}
.archive-btn{width:100%;background:transparent;border:1px solid var(--line);color:var(--t2);font-family:var(--sans);font-size:11.5px;padding:7px;border-radius:6px;cursor:pointer;transition:all .15s}
.archive-btn:hover{border-color:var(--line2);color:var(--t1)}

/* Preview panel */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

.preview-topbar{height:40px;padding:0 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);flex-shrink:0}
.pt-breadcrumb{font-size:12px;color:var(--t2);flex:1}
.pt-breadcrumb span{color:var(--t1)}
.pt-actions{display:flex;gap:6px;align-items:center}
.pt-icon-btn{width:28px;height:28px;background:transparent;border:1px solid var(--line);color:var(--t2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.pt-icon-btn:hover{border-color:var(--line2);color:var(--t1)}

.preview-frame{flex:1;overflow:hidden;position:relative}
.preview-frame iframe{width:100%;height:100%;border:none}
.preview-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--t2)}
.ph-icon{font-size:40px;opacity:.3}
.ph-text{font-size:14px;color:var(--t2)}
.ph-sub{font-size:12.5px;color:var(--t3)}

/* Generate bar */
.gen-bar{padding:12px 16px;border-top:1px solid var(--line);flex-shrink:0;display:flex;gap:8px;align-items:center}
.gen-input{flex:1;background:var(--item);border:1px solid var(--line);color:var(--t1);font-family:var(--sans);font-size:13px;padding:9px 13px;border-radius:7px;outline:none;transition:border-color .15s}
.gen-input:focus{border-color:rgba(124,106,247,0.4)}
.gen-input::placeholder{color:var(--t3)}
.gen-btn{background:var(--accent);color:#fff;border:none;font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 18px;border-radius:7px;cursor:pointer;transition:opacity .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.gen-btn:hover{opacity:.88}
.gen-btn.running{background:var(--item);border:1px solid var(--line);color:var(--t2);cursor:not-allowed}

/* Gen animation */
.gen-status{display:none;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.gen-status.show{display:flex}
.gen-spinner{width:14px;height:14px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

  </div>

          </div>
          <div class="page-item" style="opacity:.6">

            <span class="page-archived">03-15</span>
          </div>
        </div>
      </div>

      <div class="vp-footer">
        <button class="archive-btn" onclick="archiveVer()">存档当前版本</button>

    </div>

    <!-- Preview -->
    <div class="preview-panel">
      <div class="preview-topbar">
        <span class="pt-breadcrumb">当前版本 / <span id="currentPage">首页</span></span>
        <div class="pt-actions">
          <button class="pt-icon-btn" title="在浏览器中打开">↗</button>
          <button class="pt-icon-btn" title="重新生成" onclick="regen()">↺</button>

        </div>
        <!-- 嵌入简单的首页原型预览 -->
        <iframe id="previewIframe" srcdoc='

<script>
function showPage(id){
  document.querySelectorAll('.page-item').forEach(el=>el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('currentPage').textContent = event.currentTarget.querySelector('.page-name').textContent;
}
function generate(){
  const inp = document.getElementById('genInput');
  if(!inp.value.trim()) return;
  const btn = document.getElementById('genBtn');
  const status = document.getElementById('genStatus');
  btn.className='gen-btn running';btn.innerHTML='生成中...';
  status.className='gen-status show';
  setTimeout(()=>{
    btn.className='gen-btn';btn.innerHTML='<span>⚡</span> 生成 / 修改';
    status.className='gen-status';
    inp.value='';
  },3200);
}
function regen(){generate();}
function archiveVer(){
  const name = prompt('存档标签名（如：v3-优化版）','v3-设计稿');
  if(name) alert('已存档为：'+name);
}
</script>
